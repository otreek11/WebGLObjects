<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGLObjects</title>

    <script type="text/javascript" src="./Common/webgl-utils.js"></script>
    <script type="text/javascript" src="./Common/initShaders2.js"></script>
    <script type="text/javascript" src="./Common/MV.js"></script>
    
    <script type="text/javascript" src="src/Obj3D.js"></script>
    <script type="text/javascript" src="src/Camera3D.js"></script>
    <script type="text/javascript" src="src/Renderer3D.js"></script>
    <script type="text/javascript" src="src/inputHandler.js"></script>
    <script type="text/javascript" src="src/DefaultObjects.js"></script>
    <script type="text/javascript" src="src/animation.js"></script>
    <script type="text/javascript" src="src/Light3D.js"></script>
    <script type="text/javascript" src="src/textureLoader.js"></script>
    <script type="text/javascript" src="src/tempmain.js"></script>

    <style>
        body { font-family: sans-serif; padding: 20px; }
        
        .main-layout {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: wrap; /* Quebra linha se a tela for pequena */
        }

        .controls-area {
            min-width: 300px;
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
        }

        .control-group { margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .control-group:last-child { border-bottom: none; }
        
        label { display: inline-block; width: 100px; }
        
        .keyboard-legend {
            margin-top: 20px;
            padding: 10px;
            background: #e0e0e0;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .keyboard-legend h4 { margin: 0 0 5px 0; }

        .github-link a {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            gap: 10px;
            background: #24292e;
            color: white;
            padding: 5px 7px;
            border-radius: 6px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        .github-link img {
            width: 30px;
            border-radius: 4px;
        }

    </style>
</head>

<body>

    <h1>WebGLObjects</h1>
    <h2>Terceira Avaliação de Computação Gráfica - UFMA</h2>

    <div class="main-layout">
        
        <div>
            <canvas id="gl-canvas" width="1024" height="768" style="border: 1px solid black; max-width: 100%;"></canvas>
        </div>

        <div class="controls-area">
            
            <div class="control-group">
                <h3>Câmera</h3>
                <div>
                    <label>FOV:</label>
                    <input type="range" id="fovSlider" min="20" max="120" value="45" step="1">
                    <span id="fovValue">45</span>°
                </div>
                <div>
                    <label>Near:</label>
                    <input type="range" id="nearSlider" min="0.1" max="5" value="0.1" step="0.1">
                    <span id="nearValue">0.1</span>
                </div>
                <div>
                    <label>Far:</label>
                    <input type="range" id="farSlider" min="1" max="50" value="20" step="1">
                    <span id="farValue">20</span>
                </div>
                <div>
                    <label>Aspect Ratio:</label>
                    <input type="range" id="aspectSlider" min="0.5" max="3.0" value="1.33" step="0.01">
                    <span id="aspectValue">1.33</span>
                </div>
                <br>
                <button id="camReset">Resetar Câmera</button>
            </div>

            <div class="control-group">
                <h3>Animação</h3>
                <div>
                    <input type="checkbox" id="animToggle" checked>
                    <label for="animToggle" style="width: auto;">Ativar animações</label>
                </div>
                <div>
                    <label>Velocidade:</label>
                    <input type="range" id="speedSlider" min="0" max="3" value="1.0" step="0.1">
                    <span id="speedValue">1.0</span>x
                </div>
            </div>
            
            <div class="github-link control-group">
                <a href="https://github.com/otreek11/WebGLObjects" target="_blank">
                    <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" 
                        alt="Repositório GitHub">
                    <span>Ir para repositório</span>
                </a>
            </div>

            <div class="keyboard-legend">
                <h4>Teclado:</h4>
                <p><strong>WASD</strong> &rarr; Movimento da Câmera</p>
                <p><strong>IJKL</strong> &rarr; Rotação da Câmera</p>
            </div>


        </div>
    </div>

</body>
</html>
